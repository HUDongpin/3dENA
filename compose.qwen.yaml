# Optional production overlay. Use together with compose.production.yaml.
# The base production file remains AI-off and requires no Qwen credential.
services:
  ena3d:
    environment:
      ENA3D_AI_ENABLED: "true"
      ENA3D_QWEN_REGION: ${ENA3D_QWEN_REGION:-cn-beijing}
      ENA3D_QWEN_BASE_URL: ${ENA3D_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      ENA3D_QWEN_MODEL: ${ENA3D_QWEN_MODEL:-qwen3.7-max-2026-06-08}
      ENA3D_QWEN_TIMEOUT_SECONDS: ${ENA3D_QWEN_TIMEOUT_SECONDS:-60}
      ENA3D_QWEN_CONNECT_TIMEOUT_SECONDS: ${ENA3D_QWEN_CONNECT_TIMEOUT_SECONDS:-10}
      ENA3D_QWEN_MAX_REQUEST_BYTES: ${ENA3D_QWEN_MAX_REQUEST_BYTES:-262144}
      ENA3D_QWEN_MAX_RESPONSE_BYTES: ${ENA3D_QWEN_MAX_RESPONSE_BYTES:-262144}
      ENA3D_QWEN_MAX_CONTEXT_BYTES: ${ENA3D_QWEN_MAX_CONTEXT_BYTES:-8192}
      ENA3D_QWEN_MAX_COMPLETION_TOKENS: ${ENA3D_QWEN_MAX_COMPLETION_TOKENS:-4096}
      ENA3D_QWEN_THINKING_BUDGET: ${ENA3D_QWEN_THINKING_BUDGET:-1536}
      ENA3D_QWEN_TEMPERATURE: ${ENA3D_QWEN_TEMPERATURE:-0.1}
      ENA3D_AI_MIN_CELL_N: ${ENA3D_AI_MIN_CELL_N:-5}
      ENA3D_AI_TOP_N: ${ENA3D_AI_TOP_N:-10}
      ENA3D_AI_CONTEXT_MAX_CHARS: ${ENA3D_AI_CONTEXT_MAX_CHARS:-1500}
      ENA3D_AI_MAX_CONCURRENT_JOBS: ${ENA3D_AI_MAX_CONCURRENT_JOBS:-4}
      ENA3D_AI_MAX_REQUESTS_PER_HOUR: ${ENA3D_AI_MAX_REQUESTS_PER_HOUR:-10}
      ENA3D_AI_MAX_EVIDENCE_BYTES: ${ENA3D_AI_MAX_EVIDENCE_BYTES:-65536}
      DASHSCOPE_API_KEY_FILE: /run/secrets/dashscope_api_key
    secrets:
      - source: dashscope_api_key
        target: dashscope_api_key

secrets:
  dashscope_api_key:
    file: ${ENA3D_DASHSCOPE_SECRET_FILE:?set ENA3D_DASHSCOPE_SECRET_FILE to an absolute host path}
